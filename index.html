// Bind all data-action buttons after render
function bindActionsIn(root){
  root.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(e){
      e.stopPropagation();
      var act=el.getAttribute('data-action');
      var id=el.getAttribute('data-id');
      var val=el.getAttribute('data-val');
      var val2=el.getAttribute('data-val2');
      if(act==='mProj')mProj(id);
      else if(act==='dProj')dProj(id);
      else if(act==='sProj')sProj(id);
      else if(act==='mSong')mSong(id);
      else if(act==='dSong')dSong(id);
      else if(act==='sSong')sSong(id);
      else if(act==='mSess')mSess(id);
      else if(act==='dSess')dSess(id);
      else if(act==='sSess')sSess(id);
      else if(act==='mDay')mDay(id);
      else if(act==='mCon')mCon(id);
      else if(act==='dCon')dCon(id);
      else if(act==='sCon')sCon(id);
      else if(act==='mPros')mPros(id);
      else if(act==='dPros')dPros(id);
      else if(act==='sPros')sPros(id);
      else if(act==='convP')convP(id);
      else if(act==='mSpl')mSpl(id);
      else if(act==='dSpl')dSpl(id);
      else if(act==='sSpl')sSpl(id);
      else if(act==='mArt')mArt(id);
      else if(act==='dArt')dArt(id);
      else if(act==='sArt')sArt(id);
      else if(act==='uSplSt'){var s=document.getElementById('splst-'+id);if(s)uSplSt(id,s.value);}
      else if(act==='uSplLnk'){var l=document.getElementById('spllnk-'+id);if(l)uSplLnk(id,l.value);}
      else if(act==='uPL')uPL(id,val,val2);
      else if(act==='uSL')uSL(id,val,val2);
      else if(act==='CM')CM();
      else if(act==='syncCal')syncAllToGCal();
      else if(act==='goSearch')go(id);
      else if(act==='calPrev'){CAL.m--;if(CAL.m<0){CAL.m=11;CAL.y--;}R();}
      else if(act==='calNext'){CAL.m++;if(CAL.m>11){CAL.m=0;CAL.y++;}R();}
    });
  });
  // Bind change events for inline inputs
  root.querySelectorAll('[data-change]').forEach(function(el){
    el.addEventListener('change',function(){
      var act=el.getAttribute('data-change');
      var id=el.getAttribute('data-id');
      var key=el.getAttribute('data-key');
      if(act==='uSplSt')uSplSt(id,el.value);
      else if(act==='uSplLnk')uSplLnk(id,el.value);
      else if(act==='uPL')uPL(id,key,el.value);
      else if(act==='uSL')uSL(id,key,el.value);
      else if(act==='sfq'){SF.q=el.value;R();}
      else if(act==='sfa'){SF.a=el.value;R();}
      else if(act==='sfp'){SF.p=el.value;R();}
      else if(act==='sfs'){SF.s=el.value;R();}
    });
    el.addEventListener('input',function(){
      var act=el.getAttribute('data-change');
      if(act==='sfq'){SF.q=el.value;R();}
    });
  });
}

var CAL={y:new Date().getFullYear(),m:new Date().getMonth()};
function rSess(){

  var h='<div class="sh"><div><h2>Studio Calendar</h2><p class="shs">'+MO[m]+' '+y+'</p></div>';

  h+='<button class="btn btp" data-action="mSess">+ Book Session</button></div></div>';

  h+='<div class="cg2">';
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var d=1;d<=dim;d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var ev=D.sessions.filter(function(s){return s.date===ds;});

    h+='<div class="cc'+(isT?' td':'')+'" data-action="mDay" data-id="'+ds+'"><div class="cn">'+d+'</div>'+ev.slice(0,2).map(function(s){return '<div class="cev">'+esc(s.title)+'</div>';}).join('')+(ev.length>2?'<div class="f9 cm">+'+(ev.length-2)+'</div>':'')+'</div>';
  }
  h+='</div></div>';
  h+='<div class="card"><div class="sh"><h2>All Sessions</h2></div>';
  D.sessions.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(s){
    h+='<div class="sr"><div class="sdb"><div class="f9 cm">'+new Date(s.date).toLocaleDateString('en-US',{month:'short'})+'</div><div style="font-size:15px;font-weight:900;color:var(--ac)">'+new Date(s.date).getDate()+'</div></div><div style="flex:1"><div class="f13 w7">'+esc(s.title)+'</div><div class="f11 cs">'+esc(s.studio)+' '+esc(s.startTime)+'-'+esc(s.endTime)+'</div></div>'+bdg(s.type,'#38bdf8')+'<button class="btn btg btsm" data-action="mSess" data-id="'+s.id+'">Edit</button></div>';
  });
  h+='</div>';

document.getElementById('si').addEventListener('input',function(){

  var o=document.getElementById('so');
  if(!q){o.classList.remove('show');o.innerHTML='';return;}
  var rP=D.projects.filter(function(p){return p.title.toLowerCase().includes(q)||p.artist.toLowerCase().includes(q);});
  var rS=D.songs.filter(function(s){return s.title.toLowerCase().includes(q);});
  var tot=rP.length+rS.length;
  var h='<div class="sos" style="border-bottom:1px solid var(--b1)"><span class="mono f11 cs">'+tot+' results</span></div>';
  if(rP.length){
    h+='<div class="sos"><div class="sol">Projects</div>';
    rP.forEach(function(p){h+='<div class="sor" data-action="goSearch" data-id="projects">'+hd(p.health)+'<span class="f12 w7">'+esc(p.title)+'</span></div>';});
    h+='</div>';
  }
  if(rS.length){
    h+='<div class="sos"><div class="sol">Songs</div>';
    rS.forEach(function(s){h+='<div class="sor" data-action="goSearch" data-id="songs">'+bdg(s.status,SCS[s.status]||'#3a3a55')+'<span class="f12 w7">'+esc(s.title)+'</span></div>';});
    h+='</div>';
  }
  if(!tot)h+='<div style="padding:24px;text-align:center;color:var(--mute);font-size:12px">No results</div>';
  o.innerHTML=h;
  o.classList.add('show');
